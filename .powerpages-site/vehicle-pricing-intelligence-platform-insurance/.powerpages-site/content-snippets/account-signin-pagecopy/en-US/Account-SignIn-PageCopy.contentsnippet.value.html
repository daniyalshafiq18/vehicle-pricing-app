<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function () {
    // Check localStorage for 'logout' key
    const logoutFlag = localStorage.getItem('logout');
    
    // ── MATCHED DASHBOARD GLOBAL CSS ARCHITECTURE ───────────────────────────
    $("head").append(`
        <link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <style>
            /* Reset & Global Scope mirroring Dashboard layout */
            * { 
                font-family: 'Encode Sans', sans-serif !important; 
                box-sizing: border-box; 
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                background-color: #f4f6fc; /* Dashboard background shade */
            }
            #content-container {
                padding: 0 !important;
                margin: 0 !important;
                max-width: 100% !important;
                width: 100%;
            }

            /* Dashboard Background Wrapper & Glass Overlays */
            .dc-banner-wrapper {
                background: linear-gradient(135deg, #f8fafc, #edf2f7); /* Professional dashboard gradient fallback */
                height: 100vh;
                width: 100%;
            }
            .dc-banner-overlay {
                background: rgba(15, 23, 42, 0.04); /* Soft canvas accent overlay */
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            /* Unified Login Card - Matched to Dashboard Card Component */
            .dc-login-card-view {
                background-color: #ffffff;
                width: 100%;
                max-width: 460px;
                padding: 40px 36px;
                display: flex;
                flex-direction: column;
                align-items: center;
                border-radius: 16px; /* Matched dashboard card rounding */
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
                border: 1px solid #e2e8f0; /* Matched card stroke */
                text-align: center;
            }

            /* Brand Typography Alignment */
            .dc-main-title {
                font-size: 24px;
                font-weight: 700;
                color: #0f172a; /* Slate 900 Deep Title Accent */
                margin: 0 0 4px 0;
                letter-spacing: -0.5px;
            }
            .dc-sub-title {
                font-size: 14px;
                font-weight: 500;
                color: #64748b; /* Slate 500 Subtext */
                margin: 0 0 32px 0;
            }
            .dc-card-footer-logo {
                max-height: 38px;
                width: auto;
                object-fit: contain;
                margin-top: 28px;
                opacity: 0.8;
            }
            
            /* Premium Button Styles Overriding Provider Node Elements */
            button[name='provider'] {
                background-color: #ffffff !important;
                color: #0f172a !important;
                font-size: 15px !important;
                font-weight: 600 !important;
                border-radius: 8px !important; /* Matched dropdown component corners */
                border: 1px solid #cbd5e1 !important; /* Neutral outline */
                padding: 12px 24px !important;
                width: 100% !important;
                box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
                transition: all 0.15s ease-in-out !important;
                cursor: pointer !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                gap: 10px !important;
            }
            button[name='provider']:hover {
                background-color: #f8fafc !important;
                border-color: #94a3b8 !important;
                transform: translateY(-1px) !important;
            }
            button[name='provider']:active {
                background-color: #f1f5f9 !important;
                transform: translateY(0) !important;
            }

            /* Custom Icon Badge to replicate the VP logo styling */
            .dc-dashboard-badge {
                width: 48px;
                height: 48px;
                background-color: #0e39cd; /* Primary deep blue app brand color from photo */
                color: #ffffff;
                font-weight: 700;
                font-size: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 10px;
                margin-bottom: 16px;
                box-shadow: 0 4px 12px rgba(14, 57, 205, 0.2);
            }

            /* Full Screen Loader Module Customisations */
            #page-loader {
                position: fixed;
                inset: 0;
                background: rgba(248, 250, 252, 0.85); /* Light backdrop matching dashboard feel */
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                z-index: 99999;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
            
            /* Clean Chips UI for Status Steps */
            .dc-chips { display: flex; justify-content: center; gap: 8px; margin-top: 24px; width: 100%; }
            .dc-chip {
                font-size: 12px; font-weight: 600;
                color: #94a3b8;
                background: #f8fafc;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                padding: 6px 16px;
                display: flex; align-items: center; gap: 6px;
                flex: 1;
                justify-content: center;
            }
            .dc-chip.active {
                color: #0e39cd;
                background: #eff6ff;
                border-color: #bfdbfe;
            }
            .dc-chip-dot {
                width: 6px; height: 6px; border-radius: 50%;
                background: currentColor;
            }
            @media (max-width: 520px) {
                .dc-login-card-view { width: 92vw; padding: 32px 20px; }
            }
        </style>
    `);

    // ── INTERFACES ROUTING CONDITIONAL ──────────────────────────────────────
    if (logoutFlag === 'true') {
        localStorage.removeItem('logout');
        
        // --- VIEW A: SIMPLIFIED LAYOUT (POST-LOGOUT) ---
        $("#content-container").removeClass("container wrapper-body");
        let myForm = $("form[action='/Account/Login/ExternalLogin']").first();
        let clonedForm = myForm.clone(true); 
        
        $("#content-container").html(`
            <div class="dc-banner-wrapper">
                <div class="dc-banner-overlay">
                    <div class="dc-login-card-view">
                        <div class="dc-dashboard-badge">VP</div>
                        <h2 class="dc-main-title">Vehicle Pricing Intelligence Platform</h2>
                        <p class="dc-sub-title">Insurance Sub-System Portal</p>
                        <div id="login-form-placeholder" style="width: 100%;"></div>
                        <img class="dc-card-footer-logo" src="./login-card-logo.png" alt="logo" onerror="this.style.display='none'">
                    </div>
                </div>
            </div>
        `);
        
        $("#login-form-placeholder").append(clonedForm);
        $("#external-login-heading").remove();
        $("button[name='provider']").html(`
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Sign in with your official ID
        `);

    } else {
        localStorage.removeItem('logout');
        
        // --- VIEW B: STANDARD AUTHENTICATION WITH INTERACTIVE CONTENT ---
        $("#content-container").removeClass("container wrapper-body");
        let myForm = $("form[action='/Account/Login/ExternalLogin']").first();
        let clonedForm = myForm.clone(true); 
        
        $("#content-container").html(`
            <div class="dc-banner-wrapper">
                <div class="dc-banner-overlay">
                    <div class="dc-login-card-view">
                        <div class="dc-dashboard-badge">VP</div>
                        <h2 class="dc-main-title">Vehicle Pricing Intelligence Platform</h2>
                        <p class="dc-sub-title">Insurance Sub-System Portal</p>
                        <div id="login-form-placeholder" style="width: 100%;"></div>
                        <img class="dc-card-footer-logo" src="./login-card-logo.png" alt="logo" onerror="this.style.display='none'">
                    </div>
                </div>
            </div>
        `);
        
        $("#login-form-placeholder").append(clonedForm);
        $("#external-login-heading").remove();
        $("button[name='provider']").html(`
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-lock"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Sign in with your official ID
        `);
        
        // Inject Dashboard Themed Loader UI containing Login Button instead of Spinner
        $("body").append(`
            <div id="page-loader">
                <div class="dc-login-card-view" style="box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);">
                    <div class="dc-dashboard-badge">VP</div>
                    <h2 class="dc-main-title">Vehicle Pricing Intelligence Platform</h2>
                    <p class="dc-sub-title">Secure Enterprise Authentication Gateway</p>
                    
                    <div id="loader-login-placeholder" style="width: 100%;"></div>
                    
                    <div class="dc-chips">
                        <div class="dc-chip active" id="chip-0"><div class="dc-chip-dot"></div>Connecting</div>
                        <div class="dc-chip"        id="chip-1"><div class="dc-chip-dot"></div>Verifying</div>
                        <div class="dc-chip"        id="chip-2"><div class="dc-chip-dot"></div>Redirecting</div>
                    </div>
                </div>
            </div>
        `);

        // Safely re-clone & map the interaction form context inside the viewport overlay
        let loaderForm = myForm.clone(true);
        $("#loader-login-placeholder").append(loaderForm);
        $("#page-loader #external-login-heading").remove();
        $("#page-loader button[name='provider']").html(`
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
            Authorize & Enter Platform
        `);
        
        // Dynamic Active Chip Tracking Step Loop
        let activeChip = 0;
        const chipCycle = setInterval(() => {
            document.querySelectorAll('#page-loader .dc-chip').forEach(c => c.classList.remove('active'));
            activeChip = (activeChip + 1) % 3;
            const next = document.getElementById('chip-' + activeChip);
            if (next) next.classList.add('active');
        }, 1300);
        
        // Auto sign-in process remains functional as fallback or automated step trigger
        setTimeout(() => {
            clearInterval(chipCycle);
            document.querySelectorAll('#page-loader .dc-chip').forEach(c => c.classList.add('active'));
            triggerProviderButtonClick();
        }, 4000);
    }
});

function triggerProviderButtonClick() {
    const btn = document.querySelector('#page-loader button[name="provider"]') || document.querySelector('button[name="provider"]');
    if (btn) {
        btn.click();
    } else {
        console.log("External registration node identifier target missing");
    }
}
</script>
